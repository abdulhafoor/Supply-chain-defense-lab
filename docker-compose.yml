services:
  attacker:
    image: node:18
    container_name: attacker
    working_dir: /app
    volumes:
      - ./attacker:/app
    networks:
      - labnet
    command: ["node","server.js"]

  victim:
    image: node:18
    container_name: victim
    working_dir: /app
    volumes:
      - ./victim:/app
      - ./attacker/benign.tgz:/app/benign.tgz
      - ./attacker/tampered.tgz:/app/tampered.tgz
    networks:
      - labnet
    environment:
      - EXPECTED_HASHES=deeaf0230de192d2a1c3e2e668f2935a6f63b86769ff490446b5c0448066950e,5867b044bb0ff89ba3df28d409c7893208f5c948d79818f868697f04db87b17ev
      
    command: tail -f /dev/null

  monitor:
    image: node:18
    container_name: monitor
    working_dir: /app
    volumes:
      - ./monitor:/app
    networks:
      - labnet
    ports:
      - "3001:3001"
    command: ["node","alert_receiver.js"]

  dev:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ./:/workspace:cached
    networks:
      - labnet
    command: sleep infinity

networks:
  labnet:
    driver: bridge
